<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peta Minda Algebra Interaktif</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.95;
        }

        .content {
            display: flex;
            height: calc(100vh - 200px);
            min-height: 600px;
        }

        .mindmap-container {
            flex: 1;
            padding: 30px;
            overflow: auto;
            position: relative;
        }

        .notes-panel {
            width: 400px;
            background: #f8f9fa;
            padding: 30px;
            overflow-y: auto;
            border-left: 3px solid #667eea;
        }

        .notes-panel h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.8em;
        }

        .note-content {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .note-content h3 {
            color: #f5576c;
            margin-bottom: 15px;
            font-size: 1.4em;
        }

        .note-content p {
            line-height: 1.8;
            margin-bottom: 15px;
            color: #333;
        }

        .note-content .example {
            background: #e3f2fd;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            border-left: 4px solid #2196f3;
        }

        .note-content .formula {
            background: #fff3e0;
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            border-left: 4px solid #ff9800;
        }

        .mindmap-svg {
            width: 100%;
            height: 100%;
            min-height: 700px;
        }

        .node {
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .node:hover circle {
            filter: brightness(1.1);
            stroke-width: 3;
        }

        .node:hover text {
            font-weight: bold;
        }

        .node.active circle {
            stroke: #f5576c;
            stroke-width: 4;
            filter: drop-shadow(0 0 10px rgba(245, 87, 108, 0.5));
        }

        .connection {
            fill: none;
            stroke: #bbb;
            stroke-width: 2;
        }

        .center-node circle {
            fill: #667eea;
        }

        .main-node circle {
            fill: #f093fb;
        }

        .sub-node circle {
            fill: #a8edea;
        }

        text {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 14px;
            fill: #333;
            pointer-events: none;
            user-select: none;
        }

        .center-node text {
            fill: white;
            font-weight: bold;
            font-size: 20px;
        }

        .main-node text {
            fill: #2c3e50;
            font-weight: 600;
            font-size: 15px;
        }

        .instructions {
            background: #fff3cd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }

        @media (max-width: 1024px) {
            .content {
                flex-direction: column;
            }
            
            .notes-panel {
                width: 100%;
                max-height: 400px;
                border-left: none;
                border-top: 3px solid #667eea;
            }
        }

        .close-btn {
            background: #f5576c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            float: right;
            margin-bottom: 15px;
        }

        .close-btn:hover {
            background: #d43f54;
        }

        .method-buttons {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        .method-btn {
            flex: 1;
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .method-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(102, 126, 234, 0.3);
        }

        .method-btn.active {
            background: #f5576c;
            box-shadow: 0 4px 12px rgba(245, 87, 108, 0.4);
        }

        .method-content {
            display: none;
        }

        .method-content.active {
            display: block;
        }
    </style>
</head>
<body>

        <div class="content">

                </div>
                <div id="noteContent"></div>
            </div>
        </div>
    </div>

    <script>
        const mindmapData = {

        const notes = {
            'algebra': {
                title: 'ALGEBRA',
                content: `
                    <h3>Pengenalan Algebra</h3>
                    <p><strong>Algebra</strong> adalah cabang matematik yang menggunakan simbol dan huruf untuk mewakili nombor dan kuantiti dalam formula dan equations.</p>
                    
                    <div class="example">
                        <strong>Konsep Asas:</strong><br>

                        • Constants: a, b, c<br>

                    <p>Algebra membolehkan kita menyelesaikan masalah dengan mencari nilai yang tidak diketahui dan memahami hubungan antara kuantiti.</p>
                `
            },
            'partial-fractions': {
                title: 'Partial Fractions',
                content: `
                    <h3>Partial Fractions</h3>
                    <p>Partial fractions digunakan untuk memecahkan pecahan yang kompleks kepada pecahan yang lebih mudah.</p>
                    
                    <div class="formula">
                        <strong>Formula Asas:</strong><br>
                        (x+17) / [(3+x)(4-x)] = A/(3+x) + B/(4-x)
                    </div>
                    
                    <div class="method-buttons">
                        <button class="method-btn active" onclick="toggleMethod('pf', 'substitution')">
                            Substitution Method
                        </button>
                        <button class="method-btn" onclick="toggleMethod('pf', 'comparison')">
                            Comparison Method
                        </button>
                    </div>
                    
                    <div id="pf-substitution" class="method-content active">
                        <h4 style="color: #667eea; margin-bottom: 15px;">Substitution Method</h4>
                        <div class="example">
                            <strong>Contoh Penyelesaian:</strong><br>
                            (x+17) / [(3+x)(4-x)] = A/(3+x) + B/(4-x)<br><br>
                            
                            Darabkan kedua-dua belah dengan (3+x)(4-x):<br>
                            x + 17 = A(4-x) + B(3+x)<br><br>
                            
                            <strong>Langkah 1:</strong> Gantikan x = 4 (supaya A hilang):<br>
                            4 + 17 = A(4-4) + B(3+4)<br>
                            21 = 0 + 7B<br>
                            21 = 7B<br>
                            <strong>B = 3</strong><br><br>
                            
                            <strong>Langkah 2:</strong> Gantikan x = -3 (supaya B hilang):<br>
                            -3 + 17 = A(4-(-3)) + B(3+(-3))<br>
                            14 = A(7) + 0<br>
                            14 = 7A<br>
                            <strong>A = 2</strong><br><br>
                            
                            <strong>Jawapan:</strong><br>
                            (x+17) / [(3+x)(4-x)] = 2/(3+x) + 3/(4-x)
                        </div>
                    </div>
                    
                    <div id="pf-comparison" class="method-content">
                        <h4 style="color: #667eea; margin-bottom: 15px;">Comparison Method</h4>
                        <div class="example">
                            <strong>Contoh Penyelesaian:</strong><br>
                            (x+17) / [(3+x)(4-x)] = A/(3+x) + B/(4-x)<br><br>
                            
                            Darabkan kedua-dua belah dengan (3+x)(4-x):<br>
                            x + 17 = A(4-x) + B(3+x)<br>
                            x + 17 = 4A - Ax + 3B + Bx<br>
                            x + 17 = (B - A)x + (4A + 3B)<br><br>
                            
                            <strong>Bandingkan pekali (coefficients):</strong><br><br>
                            
                            <strong>Pekali (coefficient) x:</strong><br>
                            B - A = 1 ... ①<br><br>
                            
                            <strong>Sebutan (term) pemalar (constant):</strong><br>
                            4A + 3B = 17 ... ②<br><br>
                            
                            Dari ①: B = 1 + A<br>
                            Gantikan ke ②:<br>
                            4A + 3(1 + A) = 17<br>
                            4A + 3 + 3A = 17<br>
                            7A = 14<br>
                            <strong>A = 2</strong><br><br>
                            
                            B = 1 + 2 = <strong>3</strong><br><br>
                            
                            <strong>Jawapan:</strong><br>
                            (x+17) / [(3+x)(4-x)] = 2/(3+x) + 3/(4-x)
                        </div>
                    </div>
                    
                    <p style="margin-top: 20px;"><strong>Tip:</strong> Substitution Method lebih cepat, tetapi Comparison Method lebih sistematik dan sesuai untuk pecahan yang kompleks.</p>
                `
            },
            'operations': {
                title: 'Algebraic Operations',
                content: `
                    <h3>Algebraic Operations</h3>
                    
                    <div class="formula">
                        <strong>Terms in Algebra:</strong><br>
                        • <strong>Variables:</strong> Simbol yang mewakili nilai (x, y, z)<br>
                        • <strong>Constants:</strong> Nilai tetap (2, 5, -3)<br>
                        • <strong>Coefficients:</strong> Nombor yang mendarab pembolehubah (dalam 3x, coefficient ialah 3)<br>
                        • <strong>Terms:</strong> Bahagian ungkapan yang dipisah oleh + atau - (dalam 2x + 3y - 5, ada 3 terms)<br>
                        • <strong>Like Terms:</strong> Terms dengan pembolehubah dan pangkat yang sama
                    </div>
                    
                    <p>Algebraic operations melibatkan penambahan, penolakan, pendaraban, dan pembahagian ungkapan algebra.</p>
                    
                    <div class="example">
                        <strong>Contoh Operations:</strong><br>
                        • Tambah: (2x + 3) + (4x - 1) = 6x + 2<br>
                        • Tolak: (5x + 2) - (2x - 3) = 3x + 5<br>
                        • Darab: (x + 2)(x + 3) = x² + 5x + 6<br>
                        • Bahagi: (6x² + 9x) ÷ 3x = 2x + 3
                    </div>
                    
                    <div class="example">
                        <strong>Soalan Simplify (Permudahkan):</strong><br><br>
                        
                        1. Permudahkan: 3x + 2y - x + 5y<br>
                        <strong>Penyelesaian:</strong><br>
                        = (3x - x) + (2y + 5y)<br>
                        = 2x + 7y<br><br>
                        
                        2. Permudahkan: 2(3x + 4) - 3(x - 2)<br>
                        <strong>Penyelesaian:</strong><br>
                        = 6x + 8 - 3x + 6<br>
                        = 3x + 14<br><br>
                        
                        3. Permudahkan: (4x²y × 3xy²) ÷ 2xy<br>
                        <strong>Penyelesaian:</strong><br>
                        = 12x³y³ ÷ 2xy<br>
                        = 6x²y²
                    </div>
                    
                    <div class="formula">
                        <strong>Hukum-hukum Penting:</strong><br>
                        • Hukum Commutative (Kalis Tukar Tertib): a + b = b + a<br>
                        • Hukum Associative (Kalis Sekutuan): (a + b) + c = a + (b + c)<br>
                        • Hukum Distributive (Agihan): a(b + c) = ab + ac
                    </div>
                `
            },
            'expansion': {
                title: 'Expansion',
                content: `
                    <h3>Expansion</h3>
                    <p>Expansion melibatkan pengembangan ungkapan algebra dalam kurungan.</p>
                    
                    <div class="formula">
                        <strong>Formula Expansion:</strong><br>
                        (a + b)² = a² + 2ab + b²<br>
                        (a - b)² = a² - 2ab + b²<br>
                        (a + b)(a - b) = a² - b²<br>
                        (a + b)³ = a³ + 3a²b + 3ab² + b³
                    </div>
                    
                    <div class="example">
                        <strong>Contoh:</strong><br>
                        (2x + 3)² = (2x)² + 2(2x)(3) + 3²<br>
                        = 4x² + 12x + 9<br><br>
                        
                        (3x - 2)(3x + 2) = (3x)² - 2²<br>
                        = 9x² - 4
                    </div>
                    
                    <p>Expansion penting untuk menyelesaikan equations dan memudahkan expressions.</p>
                `
            },
            'factorization': {
                title: 'Factorization & Quadratic Equations',
                content: `
                    <h3>Factorization</h3>
                    <p>Factorization adalah proses menulis ungkapan sebagai hasil darab faktor-faktornya.</p>
                    
                    <div class="example">
                        <strong>Jenis-jenis Factorization:</strong><br><br>
                        
                        1. <strong>Common Factors (Faktor Sepunya):</strong><br>
                        6x + 9 = 3(2x + 3)<br><br>
                        
                        2. <strong>Difference of Two Squares (Perbezaan Dua Kuasa Dua):</strong><br>
                        x² - 9 = (x + 3)(x - 3)<br><br>
                        
                        3. <strong>Quadratic Trinomial:</strong><br>
                        x² + 5x + 6 = (x + 2)(x + 3)<br><br>
                        
                        4. <strong>Grouping (Kumpulan):</strong><br>
                        2x + 2y + ax + ay = 2(x + y) + a(x + y)<br>
                        = (2 + a)(x + y)
                    </div>
                    
                    <div class="formula">
                        <strong>Rumus Factorization:</strong><br>
                        a² - b² = (a + b)(a - b)<br>
                        a² + 2ab + b² = (a + b)²<br>
                        a² - 2ab + b² = (a - b)²
                    </div>
                    
                    <h3 style="margin-top: 25px; color: #f5576c;">Quadratic Equations</h3>
                    <p>Quadratic equations adalah equations dalam bentuk ax² + bx + c = 0, dengan a ≠ 0.</p>
                    
                    <div class="example">
                        <strong>Kaedah Penyelesaian:</strong><br><br>
                        
                        1. <strong>Factorization:</strong><br>
                        x² + 5x + 6 = 0<br>
                        (x + 2)(x + 3) = 0<br>
                        x = -2 atau x = -3<br><br>
                        
                        2. <strong>Completing the Square (Melengkapkan Kuasa Dua):</strong><br>
                        x² + 6x + 5 = 0<br>
                        x² + 6x = -5<br>
                        x² + 6x + 9 = -5 + 9<br>
                        (x + 3)² = 4<br>
                        x + 3 = ±2<br>
                        x = -1 atau x = -5<br><br>
                        
                        3. <strong>Quadratic Formula:</strong><br>
                        x = [-b ± √(b² - 4ac)] / 2a
                    </div>
                    
                    <div class="formula">
                        <strong>Discriminant (D):</strong><br>
                        D = b² - 4ac<br><br>
                        
                        • D > 0: Dua punca (roots) nyata berbeza<br>
                        • D = 0: Dua punca (roots) nyata sama<br>
                        • D < 0: Tiada punca (roots) nyata
                    </div>
                `
            },
            'polynomials': {
                title: 'Polynomials',
                content: `
                    <h3>Polynomials</h3>
                    <p>Polynomials adalah ungkapan algebra yang mengandungi satu atau lebih terms dengan pembolehubah berpangkat integer tak negatif.</p>
                    
                    <div class="example">
                        <strong>Contoh Polynomials:</strong><br>
                        R(x) = x² + 5x - 1<br>
                        S(x) = -2x² - x + 5<br><br>
                        
                        <strong>Operations pada Polynomials:</strong><br>
                        a) R(x) - S(x) = (x² + 5x - 1) - (-2x² - x + 5)<br>
                        = x² + 5x - 1 + 2x² + x - 5<br>
                        = 3x² + 6x - 6<br><br>
                        
                        b) 2R(x) + 3S(x)<br>
                        = 2(x² + 5x - 1) + 3(-2x² - x + 5)<br>
                        = 2x² + 10x - 2 - 6x² - 3x + 15<br>
                        = -4x² + 7x + 13
                    </div>
                    
                    <div class="formula">
                        <strong>Degree of Polynomial (Darjah Polinomial):</strong><br>
                        • Linear: ax + b (degree 1)<br>
                        • Quadratic: ax² + bx + c (degree 2)<br>
                        • Cubic: ax³ + bx² + cx + d (degree 3)
                    </div>
                `
            },
            'simultaneous': {
                title: 'Simultaneous Equations',
                content: `
                    <h3>Simultaneous Equations</h3>
                    <p>Simultaneous equations adalah set equations yang mempunyai penyelesaian sepunya.</p>
                    
                    <div class="formula">
                        <strong>Kaedah Penyelesaian:</strong><br>
                        1. Substitution Method<br>
                        2. Elimination Method<br>
                        3. Graphical Method
                    </div>
                    
                    <div class="method-buttons">
                        <button class="method-btn active" onclick="toggleMethod('se', 'substitution')">
                            Substitution Method
                        </button>
                        <button class="method-btn" onclick="toggleMethod('se', 'elimination')">
                            Elimination Method
                        </button>
                    </div>
                    
                    <div id="se-substitution" class="method-content active">
                        <h4 style="color: #667eea; margin-bottom: 15px;">Substitution Method</h4>
                        <div class="example">
                            <strong>Contoh 1:</strong><br><br>
                            
                            Diberi: y = 2x - 3 ... ①<br>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3x + 2y = 8 ... ②<br><br>
                            
                            <strong>Langkah 1:</strong> Gantikan ① ke dalam ②<br>
                            3x + 2(2x - 3) = 8<br>
                            3x + 4x - 6 = 8<br>
                            7x = 14<br>
                            x = 2<br><br>
                            
                            <strong>Langkah 2:</strong> Gantikan x = 2 ke dalam ①<br>
                            y = 2(2) - 3<br>
                            y = 4 - 3<br>
                            y = 1<br><br>
                            
                            <strong>Penyelesaian:</strong> x = 2, y = 1
                        </div>
                        
                        <div class="example">
                            <strong>Contoh 2:</strong><br>
                            2x - 3y = 5 ... ①<br>
                            x + 2y = -10 ... ②<br><br>
                            
                            Dari equation ②: x = -10 - 2y<br>
                            Gantikan ke equation ①:<br>
                            2(-10 - 2y) - 3y = 5<br>
                            -20 - 4y - 3y = 5<br>
                            -7y = 25<br>
                            y = -25/7<br><br>
                            
                            x = -10 - 2(-25/7)<br>
                            x = -10 + 50/7<br>
                            x = -20/7
                        </div>
                        
                        <p><strong>Bila gunakan?</strong> Apabila salah satu variable sudah terasing atau mudah untuk diasingkan.</p>
                    </div>
                    
                    <div id="se-elimination" class="method-content">
                        <h4 style="color: #667eea; margin-bottom: 15px;">Elimination Method</h4>
                        <div class="example">
                            <strong>Contoh 1:</strong><br><br>
                            
                            Diberi: 2x - y = 7 ... ①<br>
                            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3x + 2y = 4 ... ②<br><br>
                            
                            <strong>Langkah 1:</strong> Samakan coefficient y<br>
                            ① × 2: 4x - 2y = 14 ... ③<br><br>
                            
                            <strong>Langkah 2:</strong> Tambah ③ dan ②<br>
                            4x - 2y + 3x + 2y = 14 + 4<br>
                            7x = 18<br>
                            x = 18/7<br><br>
                            
                            <strong>Langkah 3:</strong> Gantikan x ke ①<br>
                            2(18/7) - y = 7<br>
                            36/7 - y = 49/7<br>
                            y = -13/7<br><br>
                            
                            <strong>Penyelesaian:</strong> x = 18/7, y = -13/7
                        </div>
                        
                        <div class="example">
                            <strong>Contoh 2:</strong><br>
                            3x + 2y = 12 ... ①<br>
                            5x - 2y = 4 ... ②<br><br>

                            Tambah ① dan ②:<br>
                            8x = 16<br>
                            x = 2<br><br>
                            
                            Gantikan ke ①:<br>
                            3(2) + 2y = 12<br>
                            6 + 2y = 12<br>
                            y = 3
                        </div>
                        
                        <p><strong>Bila gunakan?</strong> Apabila coefficients mudah disamakan, atau untuk equations yang lebih kompleks.</p>
                    </div>
                `
            },

            'formulae': {
                title: 'Formulae',
                content: `
                    <h3>Formulae Penting dalam Algebra</h3>
                    
                    <div class="formula">
                        <strong>Quadratic Formula:</strong><br>
                        x = [-b ± √(b² - 4ac)] / 2a<br><br>
                        
                        <strong>Sum and Product of Roots (Jumlah dan Hasil Punca):</strong><br>
                        α + β = -b/a<br>
                        αβ = c/a<br><br>
                        
                        <strong>New Equation (Persamaan Baru):</strong><br>
                        Jika α dan β adalah roots, maka:<br>
                        x² - (α + β)x + αβ = 0
                    </div>
                    
                    <div class="example">
                        <strong>Contoh Penggunaan:</strong><br>
                        Untuk x² - 5x + 6 = 0<br><br>
                        
                        a = 1, b = -5, c = 6<br>
                        x = [5 ± √(25 - 24)] / 2<br>
                        x = [5 ± 1] / 2<br>
                        x = 3 atau x = 2
                    </div>
                    
                    <p>Formulae ini membantu menyelesaikan equations dengan lebih cepat dan tepat.</p>
                `
            },

            'quadratic': {
                title: 'Persamaan Kuadratik',
                content: `
                    <h3>Persamaan Kuadratik</h3>
                    <p>Persamaan kuadratik adalah persamaan dalam bentuk ax² + bx + c = 0, dengan a ≠ 0.</p>
                    
                    <div class="example">
                        <strong>Kaedah Penyelesaian:</strong><br><br>
                        
                        1. <strong>Pemfaktoran:</strong><br>
                        x² + 5x + 6 = 0<br>
                        (x + 2)(x + 3) = 0<br>
                        x = -2 atau x = -3<br><br>
                        
                        2. <strong>Melengkapkan Kuasa Dua:</strong><br>
                        x² + 6x + 5 = 0<br>
                        x² + 6x = -5<br>
                        x² + 6x + 9 = -5 + 9<br>
                        (x + 3)² = 4<br>
                        x + 3 = ±2<br>
                        x = -1 atau x = -5<br><br>
                        
                        3. <strong>Formula Kuadratik:</strong><br>
                        x = [-b ± √(b² - 4ac)] / 2a
                    </div>
                    
                    <div class="formula">
                        <strong>Diskriminan (D):</strong><br>
                        D = b² - 4ac<br><br>
                        
                        • D > 0: Dua punca nyata berbeza<br>
                        • D = 0: Dua punca nyata sama<br>
                        • D < 0: Tiada punca nyata
                    </div>
                `
            }
        };

        function createConnections() {
            const connectionsGroup = document.getElementById('connections');
            const center = mindmapData.center;
            
            mindmapData.nodes.forEach(node => {
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                const d = `M ${center.x} ${center.y} Q ${(center.x + node.x) / 2} ${(center.y + node.y) / 2} ${node.x} ${node.y}`;
                path.setAttribute('d', d);
                path.setAttribute('class', 'connection');
                connectionsGroup.appendChild(path);
            });
        }

        function createNodes() {
            const nodesGroup = document.getElementById('nodes');
            
            // Create center node
            const centerGroup = createNodeElement(mindmapData.center, 'center-node');
            nodesGroup.appendChild(centerGroup);
            
            // Create other nodes
            mindmapData.nodes.forEach(node => {
                const nodeGroup = createNodeElement(node, 'main-node');
                nodesGroup.appendChild(nodeGroup);
            });
        }

        function createNodeElement(node, className) {
            const group = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            group.setAttribute('class', `node ${className}`);
            group.setAttribute('data-id', node.id);
            
            const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
            circle.setAttribute('cx', node.x);
            circle.setAttribute('cy', node.y);
            circle.setAttribute('r', className === 'center-node' ? 60 : 50);
            circle.setAttribute('stroke', '#fff');
            circle.setAttribute('stroke-width', '2');
            group.appendChild(circle);
            
            const lines = node.label.split('\n');
            const textGroup = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            
            lines.forEach((line, index) => {
                const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                text.setAttribute('x', node.x);
                text.setAttribute('y', node.y + (index - (lines.length - 1) / 2) * 16);
                text.setAttribute('text-anchor', 'middle');
                text.setAttribute('dominant-baseline', 'middle');
                text.textContent = line;
                textGroup.appendChild(text);
            });
            
            group.appendChild(textGroup);
            
            group.addEventListener('click', () => showNote(node.id));
            
            return group;
        }

        function showNote(nodeId) {
            // Remove active class from all nodes
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
            
            // Add active class to clicked node
            const activeNode = document.querySelector(`[data-id="${nodeId}"]`);
            if (activeNode) {
                activeNode.classList.add('active');
            }
            
            const noteContent = document.getElementById('noteContent');
            const note = notes[nodeId];
            
            if (note) {
                noteContent.innerHTML = `
                    <button class="close-btn" onclick="closeNote()">✕ Tutup</button>
                    <h2>${note.title}</h2>
                    <div class="note-content">
                        ${note.content}
                    </div>
                `;
            }
        }

        function closeNote() {
            document.getElementById('noteContent').innerHTML = '';
            document.querySelectorAll('.node').forEach(n => n.classList.remove('active'));
        }

        function toggleMethod(topic, method) {
            // Get all method buttons for this topic
            const buttons = document.querySelectorAll('.method-btn');
            const contents = document.querySelectorAll('.method-content');
            
            // Remove active class from all buttons and contents
            buttons.forEach(btn => btn.classList.remove('active'));
            contents.forEach(content => content.classList.remove('active'));
            
            // Add active class to clicked button
            event.target.classList.add('active');
            
            // Show the selected method content
            const contentId = `${topic}-${method}`;
            const selectedContent = document.getElementById(contentId);
            if (selectedContent) {
                selectedContent.classList.add('active');
            }
        }

        // Initialize the mind map
        createConnections();
        createNodes();

        // Show initial welcome message
        showNote('algebra');
    </script>
</body>
</html>
