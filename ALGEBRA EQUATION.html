<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guru Algebra: Kaedah Bar Model</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            },
            svg: { fontCache: 'global' }
        };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --primary: #0f172a;
            --secondary: #3b82f6;
            --accent: #f59e0b;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f8fafc;
        }

        .bar-container {
            display: flex;
            height: 42px;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #1e293b;
            position: relative;
            background: #fff;
        }

        .bar-segment {
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.4s ease;
        }

        .comparison-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .label-name {
            width: 110px;
            font-weight: 700;
            color: #475569;
            font-size: 0.95rem;
        }

        .slide-enter {
            animation: slideIn 0.5s ease-out forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .math-box {
            font-family: 'Courier New', Courier, monospace;
            background: #f1f5f9;
            padding: 10px;
            border-radius: 8px;
            border-left: 4px solid #3b82f6;
            text-align: center;
        }

        .slide-enter > .bg-yellow-50 {
            text-align: center;
        }

        .slide-title-wrap {
            text-align: center;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        .slide-title {
            white-space: nowrap;
            max-width: 100%;
            font-size: 1.5rem;
            line-height: 1.25;
        }

        .slide-title mjx-container {
            font-size: 0.95em !important;
        }

        @media (max-width: 640px) {
            .slide-title {
                font-size: 1rem;
            }
        }

        .step-badge {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 4px;
        }

        .solution-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
        }

        .solution-steps {
            display: grid;
            gap: 10px;
        }

        .solution-step {
            display: grid;
            grid-template-columns: 28px 1fr;
            gap: 10px;
            align-items: start;
            background: #ffffff;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            padding: 10px;
        }

        .step-number {
            width: 28px;
            height: 28px;
            border-radius: 999px;
            background: #0f172a;
            color: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 800;
        }

        .equation-line {
            font-weight: 800;
            color: #0f172a;
            margin-top: 2px;
        }

        .home-menu {
            display: grid;
            gap: 16px;
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 10px;
        }

        .menu-btn {
            min-height: 54px;
            border: 1px solid #dbe4f0;
            border-radius: 10px;
            padding: 10px 12px;
            background: #ffffff;
            color: #0f172a;
            font-weight: 800;
            text-align: left;
            transition: all 0.2s ease;
        }

        .menu-btn:hover {
            border-color: #3b82f6;
            background: #eff6ff;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="p-2 md:p-6">

                                { text: "$3$", width: "15.8%", className: "bg-blue-200 text-blue-900" }
                            ]},
                            { label: "$19$", labelClass: "text-slate-600", segments: [
                                { text: "$19$", width: "100%", className: "bg-slate-400" }
                            ]}
                        ])}
                        ${stepHtml([
                            { label: "Persamaan asal", eq: "$4x + 3 = 19$" },
                            { label: "Tolak 3 pada kedua-dua belah", eq: "$4x = 19 - 3$" },
                            { label: "Ringkaskan", eq: "$4x = 16$" },
                            { label: "Bahagi kepada 4 unit sama besar", eq: "$x = 16 \\div 4 = 4$" },
                            { label: "Semakan", eq: "$4(4) + 3 = 19$" }
                        ])}
                    </div>
                `
            },
            {
                title: "Latihan Tambahan: $\\frac{x}{5} + 2 = 9$",
                content: `
                    <div class="slide-enter space-y-4">
                        <div class="math-box">Persamaan: <strong>$\\frac{x}{5} + 2 = 9$</strong></div>
                        <div class="solution-card">
                            <p class="text-center text-sm font-black text-indigo-700 mb-2">Langkah 1: Bandingkan $\\frac{x}{5} + 2$ dengan $9$</p>
                            ${miniBar([
                                { label: "$\\frac{x}{5} + 2$", labelClass: "text-indigo-600", segments: [
                                    { text: "$\\frac{x}{5}$", width: "77.78%", className: "bg-indigo-500 border-r border-white" },
                                    { text: "$2$", width: "22.22%", className: "bg-indigo-200 text-indigo-950" }
                                ]},
                                { label: "$9$", labelClass: "text-slate-600", segments: [
                                    { text: "$9$", width: "100%", className: "bg-slate-500" }
                                ]}
                            ])}
                        </div>
                        <div class="solution-card">
                            <p class="text-center text-sm font-black text-indigo-700 mb-2">Langkah 2: Tolak $2$, jadi $\\frac{x}{5} = 7$</p>
                            ${miniBar([
                                { label: "$7$", labelClass: "text-slate-600", segments: [
                                    { text: "$7$", width: "100%", className: "bg-slate-500" }
                                ]},
                                { label: "$x$", labelClass: "text-indigo-600", segments: [
                                    { text: "$7$", width: "20%", className: "bg-indigo-500 border-r border-white" },
                                    { text: "$7$", width: "20%", className: "bg-indigo-500 border-r border-white" },
                                    { text: "$7$", width: "20%", className: "bg-indigo-500 border-r border-white" },
                                    { text: "$7$", width: "20%", className: "bg-indigo-500 border-r border-white" },
                                    { text: "$7$", width: "20%", className: "bg-indigo-500" }
                                ]}
                            ])}
                        </div>
                        ${stepHtml([
                            { label: "Persamaan asal", eq: "$\\frac{x}{5} + 2 = 9$" },
                            { label: "Tolak 2 pada kedua-dua belah", eq: "$\\frac{x}{5} = 9 - 2$" },
                            { label: "Ringkaskan", eq: "$\\frac{x}{5} = 7$" },
                            { label: "Darab kedua-dua belah dengan 5", eq: "$x = 7 \\times 5 = 35$" },
                            { label: "Semakan", eq: "$\\frac{35}{5} + 2 = 9$" }
                        ])}
                    </div>
                `
            },
            {
                title: "Rumusan Operasi Songsang",
                content: `
                    <div class="slide-enter space-y-4">
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div class="solution-card text-center">
                                <p class="text-sm font-bold text-blue-700">Jika persamaan ada tambah</p>
                                <p class="text-xl font-black">$x + a = b$</p>
                                <p class="text-sm text-slate-600">guna tolak: $x = b - a$</p>
                            </div>
                            <div class="solution-card text-center">
                                <p class="text-sm font-bold text-rose-700">Jika persamaan ada tolak</p>
                                <p class="text-xl font-black">$x - a = b$</p>
                                <p class="text-sm text-slate-600">guna tambah: $x = b + a$</p>
                            </div>
                            <div class="solution-card text-center">
                                <p class="text-sm font-bold text-amber-700">Jika persamaan ada darab</p>
                                <p class="text-xl font-black">$ax = b$</p>
                                <p class="text-sm text-slate-600">guna bahagi: $x = b \\div a$</p>
                            </div>
                            <div class="solution-card text-center">
                                <p class="text-sm font-bold text-emerald-700">Jika persamaan ada bahagi</p>
                                <p class="text-xl font-black">$\\frac{x}{a} = b$</p>
                                <p class="text-sm text-slate-600">guna darab: $x = b \\times a$</p>
                            </div>
                        </div>
                    </div>
                `
            },
            {
                title: "Kesilapan Biasa",
                content: `
                    <div class="slide-enter space-y-4">
                        <div class="p-4 bg-red-50 rounded-xl border border-red-100">
                            <p class="text-red-700 font-bold text-sm">Salah: Buat operasi pada satu belah sahaja</p>
                            <p class="text-xs text-red-500">$x + 6 = 10$ tidak boleh menjadi $x = 10$.</p>
                        </div>
                        <div class="p-4 bg-emerald-50 rounded-xl border border-emerald-100">
                            <p class="text-emerald-700 font-bold text-sm">Betul: Operasi sama pada kedua-dua belah</p>
                            <p class="text-xs text-emerald-600">$x + 6 - 6 = 10 - 6$, jadi $x = 4$.</p>
                        </div>
                        <div class="p-4 bg-red-50 rounded-xl border border-red-100">
                            <p class="text-red-700 font-bold text-sm">Salah: Terbalik operasi songsang</p>
                            <p class="text-xs text-red-500">Untuk $x - 7 = 13$, jangan tolak 7 lagi. Tambah 7 untuk mendapatkan $x = 20$.</p>
                        </div>
                    </div>
                `
            },
            {
                title: "Ujian Penguasaan 1: $2x + 12 = 28$",
                content: `
                    <div class="slide-enter space-y-4">
                        ${miniBar([
                            { label: "$2x + 12$", segments: [
                                { text: "$x$", width: "28.57%", className: "bg-blue-500 border-r border-white" },
                                { text: "$x$", width: "28.57%", className: "bg-blue-500 border-r border-white" },
                                { text: "$12$", width: "42.86%", className: "bg-blue-200 text-blue-900" }
                            ]},
                            { label: "$28$", segments: [
                                { text: "$28$", width: "100%", className: "bg-slate-400" }
                            ]}
                        ])}
                        ${stepHtml([
                            { label: "Persamaan asal", eq: "$2x + 12 = 28$" },
                            { label: "Tolak 12 pada kedua-dua belah", eq: "$2x = 28 - 12$" },
                            { label: "Ringkaskan", eq: "$2x = 16$" },
                            { label: "Bahagi kepada 2 unit sama besar", eq: "$x = 16 \\div 2 = 8$" }
                        ])}
                        <div class="flex flex-col items-center gap-4">
                            <input type="number" id="quiz-input" class="w-32 p-3 text-2xl font-bold text-center border-4 border-slate-100 rounded-xl outline-none" placeholder="?">
                            <button onclick="checkQuiz(8)" class="bg-indigo-600 text-white px-8 py-2 rounded-xl font-bold shadow-lg">Semak $x$</button>
                            <div id="quiz-feedback" class="h-6 font-bold text-sm"></div>
                        </div>
                    </div>
                `
            },
            {
                title: "Ujian Penguasaan 2: $2x - 10 = x + 5$",
                content: `
                    <div class="slide-enter space-y-4">
                        <div class="math-box">Persamaan: <strong>$2x - 10 = x + 5$</strong></div>
                        ${miniBar([
                            { label: "$2x$", labelClass: "text-rose-600", segments: [
                                { text: "$x$", width: "50%", className: "bg-rose-600 border-r border-white" },
                                { text: "$x$", width: "50%", className: "bg-rose-600" }
                            ]},
                            { label: "$x + 15$", labelClass: "text-slate-600", segments: [
                                { text: "$x$", width: "50%", className: "bg-rose-400 border-r border-white" },
                                { text: "$5$", width: "16.67%", className: "bg-slate-300 border-r border-white text-slate-700" },
                                { text: "$10$", width: "33.33%", className: "bg-amber-300 text-amber-950" }
                            ]}
                        ])}
                        ${stepHtml([
                            { label: "Persamaan asal", eq: "$2x - 10 = x + 5$" },
                            { label: "Tambah 10 pada kedua-dua belah", eq: "$2x = x + 15$" },
                            { label: "Tolak $x$ pada kedua-dua belah", eq: "$2x - x = x - x + 15$" },
                            { label: "Jawapan", eq: "$x = 15$" },
                            { label: "Semakan", eq: "$2(15) - 10 = 15 + 5$" }
                        ])}
                        <div class="flex flex-col items-center gap-4">
                            <input type="number" id="quiz-input" class="w-32 p-3 text-2xl font-bold text-center border-4 border-slate-100 rounded-xl outline-none" placeholder="?">
                            <button onclick="checkQuiz(15)" class="bg-rose-600 text-white px-8 py-2 rounded-xl font-bold">Semak $x$</button>
                            <div id="quiz-feedback" class="h-6 font-bold text-sm"></div>
                        </div>
                    </div>
                `
            },
            {
                title: "Tahniah",
                content: `
                    <div class="slide-enter text-center space-y-6">
                        <div class="text-7xl font-black text-amber-500">100%</div>
                        <h2 class="text-3xl font-black text-slate-800">Syabas Cikgu!</h2>
                        <p class="text-slate-600 leading-relaxed max-w-sm mx-auto">
                            Semua contoh kini menunjukkan persamaan asal, operasi songsang, ringkasan, jawapan dan semakan.
                        </p>
                        <button onclick="location.reload()" class="px-8 py-3 bg-slate-900 text-white rounded-2xl font-bold">Mula Semula Panduan</button>
                    </div>
                `
            }
        ];

        improvedSlides.unshift({
            title: "Home: Subtopik dan Soalan",
            content: `
                <div class="home-menu slide-enter">
                    <div class="text-center space-y-2">
                        <h3 class="text-2xl font-black text-slate-800">Pilih Subtopik atau Soalan</h3>
                        <p class="text-sm text-slate-500">Klik mana-mana pilihan untuk pergi terus ke bahagian tersebut.</p>
                    </div>
                    ${menuSection("Subtopik", [
                        { label: "Persamaan Algebra & Bar Model", index: 1 },
                        { label: "7 Langkah Emas Penyelesaian", index: 2 },
                        { label: "Kes Lanjutan: $x$ di Dua Belah", index: 7 },
                        { label: "Rumusan Operasi Songsang", index: 14 },
                        { label: "Kesilapan Biasa", index: 15 }
                    ])}
                    ${menuSection("Contoh dan Latihan", [
                        { label: "Contoh 1: Tambah $x + 6 = 10$", index: 3 },
                        { label: "Contoh 2: Tolak $x - 7 = 13$", index: 4 },
                        { label: "Contoh 3: Dua Langkah $2x + 5 = 9$", index: 5 },
                        { label: "Contoh 4: Dua Langkah $3x - 2 = 7$", index: 6 },
                        { label: "Cabaran Berpandu $3x - 1 = 2x + 4$", index: 8 },
                        { label: "Latihan Darab $3x = 21$", index: 9 },
                        { label: "Latihan Bahagi $\\frac{x}{4} = 8$", index: 10 }
                    ])}
                    ${menuSection("Soalan", [
                        { label: "Problem Solving: Tiket Taman", index: 11 },
                        { label: "Latihan Tambahan $4x + 3 = 19$", index: 12 },
                        { label: "Latihan Tambahan $\\frac{x}{5} + 2 = 9$", index: 13 },
                        { label: "Ujian Penguasaan 1: $2x + 12 = 28$", index: 16 },
                        { label: "Ujian Penguasaan 2: $2x - 10 = x + 5$", index: 17 }
                    ])}
                </div>
            `
        });

        slides.splice(0, slides.length, ...improvedSlides);

        let currentSlideIndex = 0;
        let visibleStepCount = 0;

        function renderSlide() {
            const slide = slides[currentSlideIndex];
            const container = document.getElementById('slide-container');
            visibleStepCount = 0;
            
            container.innerHTML = `
                <div class="mb-6 slide-title-wrap">
                    <h2 class="slide-title font-extrabold text-slate-800 border-b-4 border-blue-500 inline-block pb-1">${slide.title}</h2>
                </div>
                <div class="flex-1 flex flex-col justify-center">
                    ${slide.content}
                </div>
            `;

            const progress = ((currentSlideIndex + 1) / slides.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').textContent = `Slide ${currentSlideIndex + 1} / ${slides.length}`;
            document.getElementById('percentage-text').textContent = `${Math.round(progress)}%`;
            
            document.getElementById('prev-btn').disabled = currentSlideIndex === 0;
            
            updateStepReveal();
            updateDots();
            typesetMath();
        }

        function getSolutionSteps() {
            return Array.from(document.querySelectorAll('#slide-container .solution-step'));
        }

        function updateStepReveal() {
            const steps = getSolutionSteps();
            steps.forEach((step, index) => {
                const isVisible = index < visibleStepCount;
                step.style.display = isVisible ? 'grid' : 'none';
                if (isVisible) {
                    step.classList.add('slide-enter');
                }
            });
            updateNavigationButtons(steps.length);
        }

        function updateNavigationButtons(stepCount = getSolutionSteps().length) {
            const nextBtn = document.getElementById('next-btn');
            const stepBtn = document.getElementById('step-btn');
            const homeBtn = document.getElementById('home-btn');
            const hasMoreSteps = stepCount > 0 && visibleStepCount < stepCount;

            stepBtn.disabled = !hasMoreSteps;
            stepBtn.textContent = hasMoreSteps ? `Tunjuk Langkah ${visibleStepCount + 1}` : 'Tunjuk Langkah';
            homeBtn.disabled = currentSlideIndex === 0;

            if (currentSlideIndex === slides.length - 1) {
                nextBtn.textContent = 'Tamat';
                return;
            }
            nextBtn.textContent = 'Seterusnya →';
        }

        function typesetMath() {
            const container = document.getElementById('slide-container');
            if (window.MathJax && MathJax.typesetPromise) {
                MathJax.typesetClear && MathJax.typesetClear([container]);
                MathJax.typesetPromise([container]).catch(() => {});
            }
        }

        function revealStep() {
            const steps = getSolutionSteps();
            if (visibleStepCount < steps.length) {
                visibleStepCount++;
                updateStepReveal();
                typesetMath();
            }
        }

        function nextSlide() {
            if (currentSlideIndex < slides.length - 1) {
                currentSlideIndex++;
                renderSlide();
            }
        }

        function prevSlide() {
            const steps = getSolutionSteps();
            if (visibleStepCount > 0 && steps.length > 0) {
                visibleStepCount--;
                updateStepReveal();
                typesetMath();
                return;
            }

            if (currentSlideIndex > 0) {
                currentSlideIndex--;
                renderSlide();
            }
        }

        function goToSlide(index) {
            if (index >= 0 && index < slides.length) {
                currentSlideIndex = index;
                renderSlide();
            }
        }

        function goHome() {
            goToSlide(0);
        }

        function updateDots() {
            const dotNav = document.getElementById('dot-nav');
            dotNav.innerHTML = slides.map((_, i) => `
                <div class="w-2 h-2 rounded-full transition-all ${i === currentSlideIndex ? 'bg-blue-600 w-4' : 'bg-slate-300'}"></div>
            `).join('');
        }

        function checkQuiz(correctValue) {
            const input = document.getElementById('quiz-input');
            const feedback = document.getElementById('quiz-feedback');
            const userVal = parseInt(input.value);

            if (userVal === correctValue) {
                feedback.innerHTML = `<span class="text-green-600">✨ Tepat! Jawapan ialah ${correctValue}.</span>`;
                input.className = "w-32 p-3 text-2xl font-bold text-center border-4 border-green-500 bg-green-50 rounded-2xl outline-none";
                triggerConfetti();
            } else {
                feedback.innerHTML = `<span class="text-red-600">❌ Tidak tepat. Sila cuba lagi.</span>`;
                input.className = "w-32 p-3 text-2xl font-bold text-center border-4 border-red-500 bg-red-50 rounded-2xl outline-none";
            }
        }

        function triggerConfetti() {
            for (let i = 0; i < 50; i++) {
                const conf = document.createElement('div');
                conf.style.position = 'fixed';
                conf.style.width = '10px';
                conf.style.height = '10px';
                conf.style.backgroundColor = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6'][Math.floor(Math.random() * 5)];
                conf.style.left = Math.random() * 100 + 'vw';
                conf.style.top = '-10px';
                conf.style.zIndex = '1000';
                document.body.appendChild(conf);

                conf.animate([
                    { transform: 'translateY(0) rotate(0)', opacity: 1 },
                    { transform: `translateY(100vh) rotate(${Math.random() * 1000}deg)`, opacity: 0 }
                ], { duration: 1500 + Math.random() * 1500 }).onfinish = () => conf.remove();
            }
        }

        renderSlide();
        window.addEventListener('load', typesetMath);
    </script>
</body>
</html>
